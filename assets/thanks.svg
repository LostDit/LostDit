<svg xmlns="http://www.w3.org/2000/svg" width="540" height="60" viewBox="0 0 540 60">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
    .text {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      font-weight: 700;
      fill: #F75C7E;
    }
    .cursor {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      font-weight: 700;
      fill: #F75C7E;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
  <text x="10" y="42" class="text" clip-path="url(#reveal3)">
    Спасибо, что заглянули!
  </text>
  <text x="360" y="42" class="cursor">|</text>
  <defs>
    <clipPath id="reveal3">
      <rect x="0" y="0" width="0" height="60">
        <animate attributeName="width" from="0" to="540" dur="2.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
</svg>
